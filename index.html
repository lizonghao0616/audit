<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心智审计：胜算重塑计划</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', -apple-system, "SF Pro SC", "HanHei SC", sans-serif; background: #fdfdfd; color: #1a1a1a; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border: 1px solid #eee; box-shadow: 0 20px 40px rgba(0,0,0,0.03); }
        .option-btn { transition: all 0.3s; border: 1.5px solid #f0f0f0; }
        .option-btn:hover { border-color: #000; background: #fafafa; transform: translateX(5px); }
        .option-active { border-color: #000 !important; background: #000 !important; color: #fff !important; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #f1f5f9; cursor: pointer; transition: all 0.3s; border: 1px solid transparent; }
        .dot:hover { background: #cbd5e1; transform: scale(1.2); }
        .dot-active { background: #000 !important; transform: scale(1.4); box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .dot-completed { background: #94a3b8; border: 1px solid #64748b; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        button:disabled { cursor: not-allowed; filter: grayscale(1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- 身份绑定/登录遮罩层 -->
    <div id="login-overlay" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-950/90 backdrop-blur-2xl">
        <div class="glass-card bg-white p-10 rounded-[2.5rem] max-w-sm w-full text-center shadow-2xl">
            <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" />
                </svg>
            </div>
            <h2 class="text-xl font-semibold mb-2 text-slate-800">档案绑定</h2>
            <p class="text-[10px] text-slate-400 mb-8 tracking-[0.2em] uppercase">请输入手机号以激活神经元档案</p>
            
            <!-- 修改为手机号输入 -->
            <input type="tel" id="user-phone" maxlength="11" placeholder="请输入11位手机号码" 
                   class="w-full px-6 py-4 rounded-2xl bg-slate-50 border border-slate-100 mb-4 focus:outline-none focus:ring-2 focus:ring-black transition-all text-center text-lg tracking-wider">
            
            <button onclick="activateSystem()" class="w-full bg-black text-white py-4 rounded-full font-medium hover:bg-slate-800 transition-all shadow-lg">
                同步数据并开始审计
            </button>
            <p class="mt-6 text-[10px] text-slate-300 italic">“精准的物理 ID 是重塑心智的第一步”</p>
        </div>
    </div>

    <div class="w-full max-w-xl">
        <div id="quiz-ui" class="hidden">
            <div class="mb-12 text-center">
                <h1 class="text-2xl font-semibold tracking-tighter italic text-slate-800">心智审计 · MIND AUDIT</h1>
                <p id="user-display" class="text-[10px] text-slate-400 mt-1 tracking-[0.3em] uppercase">档案加载中...</p>
                <div class="mt-6 flex justify-center space-x-3" id="dots-container"></div>
            </div>

            <div id="question-box" class="glass-card rounded-3xl p-8 md:p-12 min-h-[420px] flex flex-col justify-center">
                <div id="q-container" class="fade-in">
                    <span id="q-tag" class="text-[10px] uppercase tracking-[0.2em] text-slate-400 mb-4 block font-mono">测算模块 01</span>
                    <h2 id="q-title" class="text-xl md:text-2xl font-medium leading-snug mb-10 text-slate-900">系统就绪...</h2>
                    <div id="options-space" class="space-y-3"></div>
                </div>
            </div>

            <div class="mt-10 flex justify-between items-center text-sm">
                <button id="prev-btn" onclick="prevStep()" class="text-slate-400 hover:text-black transition-all font-medium flex items-center disabled:opacity-0">← 上一题</button>
                <span id="progress-num" class="font-mono text-xs text-slate-300">01 / 10</span>
                <button id="next-btn" onclick="nextStep()" class="text-slate-400 hover:text-black transition-all font-medium flex items-center">下一题 →</button>
            </div>
        </div>

        <!-- 结果展示及后续逻辑保持不变 -->
        <div id="loading-ui" class="hidden text-center py-20">
            <div class="relative w-24 h-24 mx-auto mb-8 animate-pulse">
                <div class="absolute inset-0 border-4 border-slate-100 rounded-full"></div>
                <div class="absolute inset-0 border-4 border-t-black rounded-full animate-spin"></div>
            </div>
            <p class="text-sm font-mono tracking-[0.2em] text-slate-500">正在同步数据至作战中心...</p>
        </div>

        <div id="result-ui" class="hidden fade-in space-y-6">
            <div class="glass-card rounded-3xl p-10 text-center relative overflow-hidden">
                <div id="status-tag" class="inline-block px-4 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest mb-4">审计完成</div>
                <div class="text-7xl font-light tracking-tighter my-4 text-slate-900" id="final-score">0</div>
                <p class="text-slate-400 text-xs uppercase tracking-widest">最终审计得分 (Audit Score)</p>
            </div>
            <div class="glass-card rounded-3xl p-8 space-y-8 text-sm text-slate-600">
                <div>
                    <h4 class="flex items-center text-slate-900 font-bold mb-4 underline decoration-slate-200 underline-offset-8"> 📊 扫描诊断报告</h4>
                    <p id="diag-text" class="leading-relaxed text-base"></p>
                </div>
                <div id="solve-box" class="p-6 rounded-2xl bg-slate-50 border border-slate-100">
                    <h4 class="text-slate-900 font-bold mb-3 flex items-center"> 🛠️ 物理补丁 / 进阶指南</h4>
                    <p id="solve-text"></p>
                </div>
            </div>
            <button onclick="location.reload()" class="w-full bg-black text-white py-5 rounded-full text-sm font-medium hover:bg-slate-800 transition-all shadow-xl">重新开启审计</button>
        </div>
    </div>

    <script>
        let globalUserPhone = "";
        let currentIdx = 0;
        const questions = [
            { t: "面对未来的不确定性，你通常的后台反应是？", o: [{ s: 1, t: "反复推演最坏结果，试图通过大脑‘剧透’未来" }, { s: 2, t: "感到焦虑，但知道想也没用，被迫走一步看一步" }, { s: 3, t: "承认世界计算不可约，专注捕捉当下的行动信号" }] },
            { t: "当你进入工作状态时，‘专注算力’通常如何分配？", o: [{ s: 3, t: "瞬间进入心流，外界杂讯被自动降噪" }, { s: 2, t: "需要较长启动时间，且容易被消息打断" }, { s: 1, t: "系统高度碎片化，大脑里像装了100个标签页" }] },
            { t: "关于你的‘外部大脑’（记事本、AI、清单），你的习惯是？", o: [{ s: 3, t: "善用外挂释放内存，大脑只负责核心决策" }, { s: 2, t: "偶尔记录，但大部分繁杂信息仍堆积在脑中" }, { s: 1, t: "完全靠脑子强记，经常感到CPU过热或忘事" }] },
            { t: "当生活出现重复的难题（如亏损或冲突），你的排错逻辑是？", o: [{ s: 1, t: "觉得是命不好，或者全是别人的Bug" }, { s: 2, t: "试图用表面沟通技巧掩盖矛盾，不求甚解" }, { s: 3, t: "剥洋葱到底，寻找底层‘第一性原理’和失衡点" }] },
            { t: "遇到突发指责或意外时，你的‘硬件’反应是？", o: [{ s: 1, t: "瞬间触发战或逃模式，心跳飙升，甚至失控" }, { s: 2, t: "表面克制，但内心反复内耗，纠结很久" }, { s: 3, t: "能快速抽离成‘观察者’，平复波段，不损内核" }] },
            { t: "关于‘知行合一’，你最真实的处境是？", o: [{ s: 2, t: "道理都懂，但思想局限在脑中，身体不动" }, { s: 1, t: "遇到事还是痛苦内耗，书上的道理瞬间归零" }, { s: 3, t: "理智与神经末梢连接，知识已转化为肌肉记忆" }] },
            { t: "当你感到能量被抽干时，你通常如何重启？", o: [{ s: 3, t: "通过呼吸、整理房间等物理动作夺回控制权" }, { s: 1, t: "疯狂刷手机或暴饮暴食，试图暴力降温" }, { s: 2, t: "强迫自己思考大道理，结果越想越烦燥" }] },
            { t: "关于你的‘内在家庭’（理智、本能、情感），谁在掌舵？", o: [{ s: 2, t: "理智伪装成主心骨，常年压抑其他部分" }, { s: 1, t: "喧宾夺主，本能和情感像猛虎一样乱撞" }, { s: 3, t: "和谐统一，真正的‘赤子之心’稳坐C位" }] },
            { t: "面对你完全无法掌控的宏观环境，你会？", o: [{ s: 3, t: "划定边界，在可控的世界里建立绝对秩序" }, { s: 1, t: "不甘心，反复问为什么，沉溺于遗憾中" }, { s: 2, t: "强行假装不在乎，但偶然会被细节触发崩溃" }] },
            { t: "你认为‘智慧’存在于哪里？", o: [{ s: 1, t: "存在于我看过的书、我掌握的道理里" }, { s: 2, t: "存在于我成功处理过的情绪和感觉里" }, { s: 3, t: "存在于我与物理环境、他人及世界的交互中" }] }
        ];
        let answers = new Array(questions.length).fill(null);

        // 缓存检测
        window.onload = () => {
            const cachedPhone = localStorage.getItem('mind_audit_phone');
            if (cachedPhone) {
                globalUserPhone = cachedPhone;
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('quiz-ui').classList.remove('hidden');
                document.getElementById('user-display').innerText = `已绑定档案：${globalUserPhone.replace(/(\d{3})\d{4}(\d{4})/, '$1****$2')}`;
                renderQuestion();
            }
        };

        // 手机号验证并激活
        function activateSystem() {
            const phone = document.getElementById('user-phone').value;
            // 手机号正则表达式：1开头，第二位3-9，后面9位数字
            const phoneRegex = /^1[3-9]\d{9}$/;
            
            if (!phoneRegex.test(phone)) {
                alert("请输入正确的11位手机号码，以便精确匹配您的神经元档案。");
                return;
            }
            
            globalUserPhone = phone;
            localStorage.setItem('mind_audit_phone', phone);
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('quiz-ui').classList.remove('hidden');
            document.getElementById('user-display').innerText = `档案已激活：${globalUserPhone.replace(/(\d{3})\d{4}(\d{4})/, '$1****$2')}`;
            renderQuestion();
        }

        // --- 其余逻辑保持不变 ---
        const dotsContainer = document.getElementById('dots-container');
        for(let i=0; i<questions.length; i++) {
            const dot = document.createElement('div');
            dot.className = "dot";
            dot.id = `dot-${i}`;
            dot.onclick = () => jumpToQuestion(i);
            dotsContainer.appendChild(dot);
        }

        function renderQuestion() {
            const q = questions[currentIdx];
            const qBox = document.getElementById('q-container');
            qBox.classList.remove('fade-in');
            void qBox.offsetWidth;
            qBox.classList.add('fade-in');
            document.getElementById('q-tag').innerText = `测算模块 MODULE 0${currentIdx + 1}`;
            document.getElementById('q-title').innerText = q.t;
            document.getElementById('progress-num').innerText = `${String(currentIdx + 1).padStart(2, '0')} / 10`;
            const space = document.getElementById('options-space');
            space.innerHTML = '';
            q.o.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = `option-btn w-full text-left p-5 rounded-2xl text-[13px] md:text-sm leading-relaxed ${answers[currentIdx] === idx ? 'option-active' : 'bg-white'}`;
                btn.innerText = opt.t;
                btn.onclick = () => { answers[currentIdx] = idx; updateNavigation(); if(currentIdx < 9) setTimeout(() => nextStep(), 300); else renderQuestion(); };
                space.appendChild(btn);
            });
            const nextBtn = document.getElementById('next-btn');
            if(currentIdx === 9) { nextBtn.innerHTML = `生成审计报告 ✨`; nextBtn.onclick = () => finishAudit(); } 
            else { nextBtn.innerHTML = `下一题 →`; nextBtn.onclick = () => nextStep(); }
            updateNavigation();
        }

        function updateNavigation() {
            for(let i=0; i<questions.length; i++) {
                const dot = document.getElementById(`dot-${i}`);
                dot.className = "dot";
                if(i === currentIdx) dot.classList.add('dot-active');
                else if(answers[i] !== null) dot.classList.add('dot-completed');
            }
            document.getElementById('prev-btn').disabled = (currentIdx === 0);
        }

        function jumpToQuestion(i) { currentIdx = i; renderQuestion(); }
        function nextStep() { if(currentIdx < 9) { currentIdx++; renderQuestion(); } }
        function prevStep() { if(currentIdx > 0) { currentIdx--; renderQuestion(); } }

        function finishAudit() {
            if(answers.includes(null)) { alert("请完成所有模块审计"); return; }
            document.getElementById('quiz-ui').classList.add('hidden');
            document.getElementById('loading-ui').classList.remove('hidden');
            setTimeout(showResult, 2500);
        }

        function showResult() {
            document.getElementById('loading-ui').classList.add('hidden');
            document.getElementById('result-ui').classList.remove('hidden');
            const score = answers.reduce((acc, currIdx, qIdx) => acc + questions[qIdx].o[currIdx].s, 0);
            let start = 0;
            const timer = setInterval(() => { if (start >= score) { clearInterval(timer); document.getElementById('final-score').innerText = score; } else { start++; document.getElementById('final-score').innerText = start; } }, 40);

            // 结果分段逻辑（保持你要求的精细化等级）
            let res = {};
            if(score <= 13) {
                res = { tag: "系统全面熔断：神经肽重度成瘾", bg: "bg-red-500 text-white", diag: "你的身体正处于危险的“自虐”循环中。由于长期处于压抑环境，细胞对痛苦产生的“神经肽”形成重度生理成瘾。你的潜意识会“自动捕获”痛苦，甚至在平静时主动制造事端获取难受感。剧本正被潜意识完全操控。", solve: "停止讲道理，执行硬件重启！崩溃时先执行‘止损三问’（缺水/缺觉/太冷吗？）。补充电解质，并强制使用‘两吸一呼’法激活迷走神经降心率。" };
            } else if(score <= 17) {
                res = { tag: "战时高耗能模式：心有猛虎失控", bg: "bg-orange-500 text-white", diag: "你正试图用有限的大脑‘算盘珠子’去计算无穷未来，深陷‘计算不可约’死胡同，算力枯竭。杏仁核过度活跃，情感与本能彻底暴走。缺乏安全感，人际关系容易极端化，‘掏心掏肺’或‘一秒都待不下去’。", solve: "放下预测未来的执念，收回算力，专注当下。练习‘现实扭曲力场’：心烦意乱时立刻去整理书桌或打扫房间。用真实的物理交互切断大脑的发热进程。" };
            } else if(score <= 21) {
                res = { tag: "翻译算法误差：理智伪装主心骨", bg: "bg-yellow-400 text-black", diag: "硬件尚可，但大脑‘翻译算法’出现严重误差。你常把单纯生理信号（如疲劳/肠胃翻滚）误判翻译为‘焦虑’。理智伪装成最高统治者，压制真实情感。懂得大道理，但遇实战瞬间卡壳，知行断裂。", solve: "反向套路你的大脑！拓宽‘语言边界’，给情绪精准命名，提升大脑分辨率。善用外部工具，把焦虑写在纸上揉碎扔掉，让世界成为你的运算外挂。" };
            } else if(score <= 25) {
                res = { tag: "算力重组期：现实扭曲力场初显", bg: "bg-emerald-500 text-white", diag: "已具备初步觉醒意识。理解‘情绪是大脑主动建构的预测’这一底层真相。大部分时间能将外界与自我边界分离，不再盲目内耗。但旧的神经连接依然存在，重大冲突时仍有概率被打回原形。", solve: "记住‘一起放电的神经元会连在一起’。用新的物理行动去强制覆盖旧经验。坚持每日睡前练习‘两吸一呼’巩固底层神经通路，将偶发顿悟转化为稳固生理习惯。" };
            } else if(score <= 28) {
                res = { tag: "高效心流运行：知行合一觉醒者", bg: "bg-blue-500 text-white", diag: "系统运行顺畅，内耗极低！本能、情感与理智和谐协作，‘赤子之心’稳坐C位。不再试图剧透不可约的宇宙，清楚智慧不仅在大脑里，更在于你与世界的身体交互中。", solve: "已超越绝大部分人。保持对身体硬预算（电解质、睡眠）的敏锐监测。继续用高分辨率语言描绘世界，用物理行动改写神经元的连接逻辑。" };
            } else {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                res = { tag: "顶级玩家：生命体验创造者", bg: "bg-purple-600 text-white", diag: "恭喜！已看透生命系统第一性原理！不再受制于业力与阴影，能将免费的呼吸和环境化作武器。深刻践行‘我命由我不由天’，从被动受害者彻底进化为人生剧本的顶层架构师。", solve: "欢迎加入同频共振修行圈。保持每日修行与物理习惯，面临人生考卷时随时调用万物作为工具。继续突破生命认知上限，探索终极奥义。" };
            }

            document.getElementById('status-tag').innerText = res.tag;
            document.getElementById('status-tag').className = `inline-block px-4 py-1 rounded-full text-[10px] font-bold tracking-widest mb-4 ${res.bg}`;
            document.getElementById('diag-text').innerText = res.diag;
            document.getElementById('solve-text').innerText = res.solve;
            
            pushToFeishu(score, res.tag);
        }

        async function pushToFeishu(score, tag) {
            // 这里替换成你的 Pipedream 或机器人 Webhook 地址
            const botWebhook = "https://open.feishu.cn/open-apis/bot/v2/hook/4aad4c7e-08ff-473f-9ae9-70b4a179b10c"; 
            const msg = {
                "msgtype": "markdown",
                "content": {
                    "text": `### 🛡️ 系统审计预警\n**玩家手机**：${globalUserPhone}\n**审计得分**：${score} 分\n**判定结果**：${tag}\n**上报时间**：${new Date().toLocaleString()}\n---\n> _“检测到新神经元样本，建议主理人根据号码执行 1v1 精准链接。”_`
                }
            };
            fetch(botWebhook, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(msg)
            });
        }
    </script>
</body>
</html>
